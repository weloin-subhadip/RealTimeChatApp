# Full stack: MongoDB + Redis + server (Node) + client (nginx).
# Usage:  cp .env.example .env  &&  docker compose up --build
# Open:   http://localhost:8080   (or ${CLIENT_PORT})
# Stop:   docker compose down     (add -v to also wipe data + uploads)
services:
  mongo:
    image: mongo:7
    container_name: rtc_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rtc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: rtc_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      CLIENT_URL: "http://localhost:${CLIENT_PORT:-8080}"
      MONGO_URI: "mongodb://mongo:27017/realtimechat"
      REDIS_URL: "redis://redis:6379"
      COOKIE_SECURE: "false"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      ACCESS_TOKEN_TTL: "${ACCESS_TOKEN_TTL:-15m}"
      REFRESH_TOKEN_TTL: "${REFRESH_TOKEN_TTL:-7d}"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build: ./client
    container_name: rtc_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-8080}:80"

volumes:
  mongo_data:
  redis_data:
  uploads_data:
